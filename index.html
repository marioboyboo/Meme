<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVault - Random Fullscreen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }

        .fullscreen-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>

    <img id="memeImg" alt="Meme" class="fullscreen-image">

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // 📑 ADD YOUR .jpg OR .png FILE NAMES HERE!
            const memeImages = [
                "1781893487984.png",
                "5043.jpg",
                "warrior_cats_meme.png"
            ];

            const imageElement = document.getElementById('memeImg');

            if (memeImages.length > 0) {
                // Pick a random image from the list
                const randomIndex = Math.floor(Math.random() * memeImages.length);
                imageElement.src = memeImages[randomIndex];
            }
        });
    </script>

</body>
</html>
