<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVault - Remote Control</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* Setup Menu */
        .setup-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .setup-screen h1 {
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        .role-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .master-btn { background-color: #ff4500; color: white; }
        .slave-btn { background-color: #00ffcc; color: #121212; }

        /* Host Panel */
        .master-panel {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #1e1e1e;
            gap: 25px;
        }

        .prank-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: #ff4500;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.4);
            -webkit-user-drag: none;
        }

        .choose-btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #333;
            color: #fff;
            border: 2px solid #555;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .choose-btn:hover {
            background-color: #444;
            border-color: #00ffcc;
        }

        .status-text {
            color: #888;
            font-size: 0.9rem;
            text-align: center;
            max-width: 80%;
        }

        /* Popup Selection Overlay Split Screen */
        .popup-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20;
            flex-direction: column;
            padding: 20px;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            position: relative;
        }

        .close-popup-btn {
            padding: 8px 16px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* NEW Dynamic Turquoise Stay On target area */
        .stay-drop-zone {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #00ffcc;
            color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none;
        }

        .stay-drop-zone.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .stay-drop-zone.hovered {
            background: #00b38f;
            transform: scale(1.15);
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.8);
        }

        .stay-drop-zone.locked {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            background: #ff4500;
            color: white;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.6);
            cursor: pointer;
        }

        /* Split Window Layout Panels */
        .vault-split-container {
            display: flex;
            flex-direction: column;
            height: calc(100% - 85px);
            gap: 15px;
            margin-top: 15px;
        }

        .vault-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .vault-section h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid-container {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 12px;
            padding-right: 5px;
        }

        /* Visual Action Cards */
        .grid-item {
            background: #252525;
            border: 2px solid #3c3c3c;
            border-radius: 8px;
            overflow: hidden;
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            touch-action: none; /* Block default scrolling mechanics during drag actions */
        }

        .grid-item:active, .grid-item.active {
            border-color: #00ffcc;
            background: #2a2a2a;
            cursor: grabbing;
        }

        .grid-item img {
            width: 100%;
            height: 75px;
            object-fit: cover;
            pointer-events: none;
        }

        .audio-icon-box {
            width: 100%;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1b1b1b;
            font-size: 2rem;
            color: #ff4500;
            pointer-events: none;
        }

        .grid-item span {
            font-size: 0.75rem;
            padding: 6px;
            color: #aaa;
            font-weight: bold;
            pointer-events: none;
        }

        /* Floating clone feedback graphic layout during drag */
        #dragProxy {
            display: none;
            position: fixed;
            width: 90px;
            height: 65px;
            background: rgba(0, 255, 204, 0.25);
            border: 2px solid #00ffcc;
            border-radius: 6px;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%);
        }

        /* Display View */
        .slave-view {
            display: none;
            width: 100%;
            height: 100%;
            background: black;
            position: relative;
        }

        .fullscreen-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            -webkit-user-drag: none;
        }

        .fullscreen-toggle-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 16px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
        }

        #preloaderContainer {
            display: none;
        }
    </style>
</head>
<body>

    <div id="dragProxy"></div>

    <div id="setupScreen" class="setup-screen">
        <h1>Select View</h1>
        <div class="btn-group">
            <button class="role-btn master-btn" onclick="initRole('master')">Host Controller</button>
            <button class="role-btn slave-btn" onclick="initRole('slave')">Display Client</button>
        </div>
    </div>

    <div id="masterPanel" class="master-panel">
        <button id="prankBtn" class="prank-btn" oncontextmenu="return false;">PRANK</button>
        <button class="choose-btn" onclick="openPopup()">📁 CHOOSE MEME / AUDIO</button>
        <p class="status-text">Hold down PRANK for a random layout, or open the vault below to target items</p>
    </div>

    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-header">
            <button class="close-popup-btn" onclick="closePopup()">Close</button>
            
            <div id="stayDropZone" class="stay-drop-zone">STAY</div>
            
            <div style="width:75px;"></div> </div>
        <div class="vault-split-container">
            
            <div class="vault-section">
                <h3>🖼️ Specific Meme Images</h3>
                <div id="imageGridContainer" class="grid-container"></div>
            </div>

            <div class="vault-section">
                <h3>🔊 Specific MP3 Audio Tracks</h3>
                <div id="audioGridContainer" class="grid-container"></div>
            </div>

        </div>
    </div>

    <div id="slaveView" class="slave-view">
        <img id="memeImg" src="" alt="Display Screen" class="fullscreen-image" oncontextmenu="return false;">
        <div id="preloaderContainer"></div>
        <button class="fullscreen-toggle-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <script>
        const MAX_SCAN_LIMIT = 100; 
        const defaultImage = "meme.jpg";

        const drone = new Scaledrone('ObXNBHan6Vjhwfha'); 
        const roomName = 'observable-meme-room';
        let room;

        let validImagesFound = ["1.png"]; 
        let validAudioFound = []; 
        let currentPrankImage = null;

        // Sticky Engine State Vectors
        let isStickyLocked = false;
        let activeDragData = null; // Stores target info if dragging occurs
        let dragTrackingActive = false;

        function initRole(role) {
            document.getElementById('setupScreen').style.display = 'none';
            room = drone.subscribe(roomName);

            room.on('open', error => {
                if (error) return alert("Scaledrone Error: " + error);
                if (role === 'master') setupMaster(); else setupSlave();
            });
        }

        // --- HOST CONTROLLER SYSTEM ---
        function setupMaster() {
            document.getElementById('masterPanel').style.display = 'flex';
            const prankBtn = document.getElementById('prankBtn');

            room.on('message', message => {
                if (message.data.action === 'SYNC_LIST') {
                    validImagesFound = message.data.images;
                    validAudioFound = message.data.audio;
                    buildPopupGrids();
                }
            });

            const startPrank = (e) => {
                if (e) e.preventDefault();
                if (isStickyLocked) return;
                const randomIndex = Math.floor(Math.random() * validImagesFound.length);
                const randomPng = validImagesFound[randomIndex];
                triggerTargetAction('TRIGGER', randomPng);
            };

            const stopPrank = (e) => {
                if (e) e.preventDefault();
                if (isStickyLocked) return;
                resetTargetAction('RESET');
            };

            prankBtn.addEventListener('mousedown', startPrank);
            window.addEventListener('mouseup', stopPrank);
            
            prankBtn.addEventListener('touchstart', startPrank, { passive: false });
            prankBtn.addEventListener('touchend', stopPrank, { passive: false });
            prankBtn.addEventListener('touchcancel', stopPrank, { passive: false });

            // Setup the Dropzone click tracking listener
            const dropZone = document.getElementById('stayDropZone');
            dropZone.addEventListener('click', () => {
                if (isStickyLocked) {
                    clearStickyLock();
                }
            });
            dropZone.addEventListener('touchend', () => {
                if (isStickyLocked) {
                    clearStickyLock();
                }
            });

            buildPopupGrids();
        }

        function triggerTargetAction(actionType, assetName) {
            drone.publish({
                room: roomName,
                message: { action: actionType, file: assetName }
            });
        }

        function resetTargetAction(resetType) {
            drone.publish({
                room: roomName,
                message: { action: resetType }
            });
        }

        function clearStickyLock() {
            isStickyLocked = false;
            const dropZone = document.getElementById('stayDropZone');
            dropZone.className = 'stay-drop-zone';
            dropZone.innerText = 'STAY';
            resetTargetAction('RESET');
        }

        // --- SPLIT GRIDS POPUP INTERACTION GENERATOR ---
        function openPopup() {
            buildPopupGrids();
            document.getElementById('popupOverlay').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('popupOverlay').style.display = 'none';
            clearStickyLock();
        }

        function buildPopupGrids() {
            const imgGrid = document.getElementById('imageGridContainer');
            const audioGrid = document.getElementById('audioGridContainer');
            if (!imgGrid || !audioGrid) return;

            const timestamp = "?t=" + new Date().getTime();

            // 1. POPULATE IMAGES
            imgGrid.innerHTML = '';
            validImagesFound.forEach(imgFile => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                const img = document.createElement('img');
                img.src = imgFile + timestamp;
                const label = document.createElement('span');
                label.innerText = imgFile;
                item.appendChild(img);
                item.appendChild(label);

                attachDragAndHoldListeners(item, 'TRIGGER', imgFile);
                imgGrid.appendChild(item);
            });

            // 2. POPULATE AUDIO
            audioGrid.innerHTML = '';
            validAudioFound.forEach(audioFile => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                const iconBox = document.createElement('div');
                iconBox.className = 'audio-icon-box';
                iconBox.innerText = '🎵';
                const label = document.createElement('span');
                label.innerText = audioFile;
                item.appendChild(iconBox);
                item.appendChild(label);

                attachDragAndHoldListeners(item, 'TRIGGER_AUDIO', audioFile);
                audioGrid.appendChild(item);
            });
        }

        // CUSTOM GESTURE ENGINE: Handles unified click-hold AND drag-to-sticky operations smoothly
        function attachDragAndHoldListeners(element, type, file) {
            let startX = 0;
            let startY = 0;
            let currentX = 0;
            let currentY = 0;
            let holdTriggered = false;

            const onStart = (clientX, clientY) => {
                if (isStickyLocked) return;
                
                startX = clientX;
                startY = clientY;
                holdTriggered = true;
                dragTrackingActive = true;
                
                activeDragData = { type: type, file: file, element: element };
                element.classList.add('active');

                // Trigger audio/image display immediately on touch down
                triggerTargetAction(type, file);

                // Show turquoise Dropzone top indicator
                document.getElementById('stayDropZone').className = 'stay-drop-zone visible';

                // Setup global follow loops
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchmove', onTouchMove, { passive: false });
                window.addEventListener('touchend', onEnd);
            };

            const onMove = (clientX, clientY) => {
                if (!dragTrackingActive) return;
                
                currentX = clientX;
                currentY = clientY;

                // Render customized tracking feedback bubble under pointer coordinates
                const proxy = document.getElementById('dragProxy');
                proxy.style.display = 'block';
                proxy.style.left = currentX + 'px';
                proxy.style.top = currentY + 'px';

                // Check collision bounds with the turquoise zone
                const dropZone = document.getElementById('stayDropZone');
                const dzRect = dropZone.getBoundingClientRect();

                if (currentX >= dzRect.left && currentX <= dzRect.right &&
                    currentY >= dzRect.top && currentY <= dzRect.bottom) {
                    dropZone.classList.add('hovered');
                } else {
                    dropZone.classList.remove('hovered');
                }
            };

            const onTouchMove = (e) => {
                if (e.touches.length > 0) {
                    onMove(e.touches[0].clientX, e.touches[0].clientY);
                }
            };

            const onEnd = (e) => {
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onEnd);
                window.removeEventListener('touchmove', onTouchMove);
                window.removeEventListener('touchend', onEnd);

                if (!dragTrackingActive) return;
                dragTrackingActive = false;
                
                element.classList.remove('active');
                document.getElementById('dragProxy').style.display = 'none';

                const dropZone = document.getElementById('stayDropZone');
                const dzRect = dropZone.getBoundingClientRect();

                // Did the user drop it inside the dropzone?
                if (currentX >= dzRect.left && currentX <= dzRect.right &&
                    currentY >= dzRect.top && currentY <= dzRect.bottom) {
                    
                    // LOCK SYSTEM IN STICKY STATE
                    isStickyLocked = true;
                    dropZone.className = 'stay-drop-zone locked';
                    dropZone.innerText = '🛑 STOP';
                    
                    // Enforce live execution keeps running
                    triggerTargetAction(type, file);
                } else {
                    // Normal release: hide zone indicator and clear display path
                    if (!isStickyLocked) {
                        dropZone.className = 'stay-drop-zone';
                        resetTargetAction('RESET');
                    }
                }
            };

            // Bind raw entry parameters safely across pointer architectures
            element.addEventListener('mousedown', (e) => onStart(e.clientX, e.clientY));
            element.addEventListener('touchstart', (e) => {
                if(e.touches.length > 0) onStart(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: false });
        }

        // --- DISPLAY CLIENT SYSTEM ---
        function setupSlave() {
            document.getElementById('slaveView').style.display = 'block';
            const imageElement = document.getElementById('memeImg');
            imageElement.src = defaultImage;

            let activeAudioTrack = null;

            scanAndRefreshAssets();
            setInterval(scanAndRefreshAssets, 60000);

            room.on('message', message => {
                const data = message.data;
                
                if (data.action === 'TRIGGER') {
                    currentPrankImage = data.file;
                    imageElement.src = currentPrankImage;
                } 
                else if (data.action === 'TRIGGER_AUDIO') {
                    if (activeAudioTrack) {
                        activeAudioTrack.pause();
                        activeAudioTrack = null;
                    }
                    activeAudioTrack = new Audio(data.file + "?t=" + new Date().getTime());
                    activeAudioTrack.play().catch(err => console.log(err));
                } 
                else if (data.action === 'RESET') {
                    if (activeAudioTrack) {
                        activeAudioTrack.pause();
                        activeAudioTrack = null;
                    }
                    currentPrankImage = null;
                    imageElement.src = defaultImage + "?t=" + new Date().getTime();
                }
            });
        }

        function scanAndRefreshAssets() {
            const preloaderContainer = document.getElementById('preloaderContainer');
            const imageElement = document.getElementById('memeImg');
            const timestamp = "?t=" + new Date().getTime();
            
            preloaderContainer.innerHTML = '';
            let discoveredImages = [];
            let discoveredAudio = [];
            let totalChecksExpected = MAX_SCAN_LIMIT * 2;
            let checksCompleted = 0;

            const checkFinished = () => {
                checksCompleted++;
                if (checksCompleted === totalChecksExpected) {
                    if (discoveredImages.length === 0) discoveredImages = ["1.png"];
                    discoveredImages.sort((a, b) => parseInt(a) - parseInt(b));
                    discoveredAudio.sort((a, b) => parseInt(a) - parseInt(b));

                    validImagesFound = discoveredImages;
                    validAudioFound = discoveredAudio;

                    drone.publish({
                        room: roomName,
                        message: { action: 'SYNC_LIST', images: validImagesFound, audio: validAudioFound }
                    });

                    if (!currentPrankImage) {
                        imageElement.src = defaultImage + timestamp;
                    }
                }
            };

            for (let i = 1; i <= MAX_SCAN_LIMIT; i++) {
                const imgFilename = i + ".png";
                const imgCheck = new Image();
                imgCheck.onload = function() {
                    discoveredImages.push(imgFilename);
                    const preload = new Image(); preload.src = imgFilename + timestamp;
                    preloaderContainer.appendChild(preload);
                    checkFinished();
                };
                imgCheck.onerror = checkFinished;
                imgCheck.src = imgFilename + timestamp;

                const audioFilename = i + ".mp3";
                const audioCheck = new Audio();
                audioCheck.oncanplaythrough = function() {
                    if (!discoveredAudio.includes(audioFilename)) discoveredAudio.push(audioFilename);
                    checkFinished();
                };
                audioCheck.onerror = checkFinished;
                audioCheck.src = audioFilename + timestamp;
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
