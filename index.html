<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub - Warrior Cats Drama</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #ff4500;
            --button-bg: #2d2d2d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background-color: var(--card-bg);
            border-bottom: 2px solid var(--accent-color);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        header span {
            color: var(--accent-color);
        }

        .meme-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .meme-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .meme-details {
            padding: 20px;
        }

        .meme-title {
            margin: 0 0 15px 0;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: var(--button-bg);
            color: var(--text-color);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: #3d3d3d;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--accent-color);
        }

        .btn-primary:hover {
            background-color: #e03d00;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Meme<span>Vault</span></h1>
    </header>

    <main class="meme-container">
        <!-- Swap the src attribute with your actual image path when hosting -->
        <img src="watermarked_img_13269143817802852709.png" alt="Me listening to my sister blab about warrior cats" class="meme-image">
        
        <div class="meme-details">
            <h2 class="meme-title">When ThunderClan drama takes over the dinner table again.</h2>
            
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="alert('Meme Upvoted!')">🔥 Upvote</button>
                <button class="btn" onclick="copyLink()">🔗 Copy Link</button>
                <button class="btn" onclick="downloadMeme()">💾 Download</button>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 MemeVault. Built for tired siblings everywhere.
    </footer>

    <script>
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied to clipboard!");
        }

        function downloadMeme() {
            const link = document.createElement('a');
            link.href = 'watermarked_img_13269143817802852709.png';
            link.download = 'warrior_cats_meme.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>

</body>
</html>
