<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVault - Remote Control</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* Setup Menu */
        .setup-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .setup-screen h1 {
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        .role-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .role-btn:active {
            transform: scale(0.98);
        }

        .master-btn { background-color: #ff4500; color: white; }
        .slave-btn { background-color: #00ffcc; color: #121212; }

        /* Host Panel */
        .master-panel {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #1e1e1e;
        }

        .prank-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: #ff4500;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.4);
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.1s ease;
        }

        .prank-btn:active {
            background: #b33000;
        }

        .status-text {
            margin-top: 20px;
            color: #888;
        }

        /* Display View */
        .slave-view {
            display: none;
            width: 100%;
            height: 100%;
            background: black;
        }

        .fullscreen-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Hidden Preloader */
        .hidden-preloader {
            display: none;
        }
    </style>
</head>
<body>

    <div id="setupScreen" class="setup-screen">
        <h1>Select View</h1>
        <div class="btn-group">
            <button class="role-btn master-btn" onclick="initRole('master')">Host Controller</button>
            <button class="role-btn slave-btn" onclick="initRole('slave')">Display Client</button>
        </div>
    </div>

    <div id="masterPanel" class="master-panel">
        <button id="prankBtn" class="prank-btn">PRANK</button>
        <p class="status-text">Hold down to trigger the image instantly on the display</p>
    </div>

    <div id="slaveView" class="slave-view">
        <img id="memeImg" src="" alt="Display Screen" class="fullscreen-image">
        <img id="preloadImg" src="" class="hidden-preloader" alt="preloader">
    </div>

    <script>
        // Prank image file name
        const pngMemes = [
            "1781893487984.png"
        ];

        // FIXED: Pointing directly to your local file name
        const defaultImage = "meme.jpg";

        const drone = new Scaledrone('ObXNBHan6Vjhwfha'); 
        const roomName = 'observable-meme-room';
        let room;

        function initRole(role) {
            document.getElementById('setupScreen').style.display = 'none';
            
            room = drone.subscribe(roomName);

            room.on('open', error => {
                if (error) {
                    alert("Scaledrone Room Error: " + error);
                    return;
                }
                
                if (role === 'master') {
                    setupMaster();
                } else {
                    setupSlave();
                }
            });
        }

        // --- HOST CONTROLLER SYSTEM ---
        function setupMaster() {
            document.getElementById('masterPanel').style.display = 'flex';
            const prankBtn = document.getElementById('prankBtn');

            const startPrank = () => {
                const randomIndex = Math.floor(Math.random() * pngMemes.length);
                const randomPng = pngMemes[randomIndex];
                
                drone.publish({
                    room: roomName,
                    message: { action: 'TRIGGER', img: randomPng }
                });
            };

            const stopPrank = () => {
                drone.publish({
                    room: roomName,
                    message: { action: 'RESET' }
                });
            };

            prankBtn.addEventListener('mousedown', startPrank);
            prankBtn.addEventListener('mouseup', stopPrank);
            prankBtn.addEventListener('mouseleave', stopPrank);
            
            prankBtn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                startPrank(); 
            });
            prankBtn.addEventListener('touchend', stopPrank);
        }

        // --- DISPLAY CLIENT SYSTEM ---
        function setupSlave() {
            document.getElementById('slaveView').style.display = 'block';
            const imageElement = document.getElementById('memeImg');
            const preloadElement = document.getElementById('preloadImg');

            // Set your local background image instantly
            imageElement.src = defaultImage;

            // Cache the prank asset into browser memory
            if (pngMemes.length > 0) {
                preloadElement.src = pngMemes[0];
            }

            room.on('message', message => {
                const data = message.data;
                
                if (data.action === 'TRIGGER') {
                    imageElement.src = data.img;
                } else if (data.action === 'RESET') {
                    imageElement.src = defaultImage;
                }
            });
        }
    </script>

</body>
</html>
