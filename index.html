<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVault - Remote Control</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* Setup Menu */
        .setup-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .setup-screen h1 {
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        .role-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .role-btn:active {
            transform: scale(0.98);
        }

        .master-btn { background-color: #ff4500; color: white; }
        .slave-btn { background-color: #00ffcc; color: #121212; }

        /* Host Panel */
        .master-panel {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #1e1e1e;
        }

        .prank-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: #ff4500;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.4);
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.1s ease;
        }

        .prank-btn:active {
            background: #b33000;
        }

        .status-text {
            margin-top: 20px;
            color: #888;
        }

        /* Display View */
        .slave-view {
            display: none;
            width: 100%;
            height: 100%;
            background: black;
            position: relative;
        }

        .fullscreen-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Bottom-Right Fullscreen Control Toggle */
        .fullscreen-toggle-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 16px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }

        .fullscreen-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* Hidden Preloader Container */
        #preloaderContainer {
            display: none;
        }
    </style>
</head>
<body>

    <div id="setupScreen" class="setup-screen">
        <h1>Select View</h1>
        <div class="btn-group">
            <button class="role-btn master-btn" onclick="initRole('master')">Host Controller</button>
            <button class="role-btn slave-btn" onclick="initRole('slave')">Display Client</button>
        </div>
    </div>

    <div id="masterPanel" class="master-panel">
        <button id="prankBtn" class="prank-btn">PRANK</button>
        <p class="status-text">Hold down to trigger a random image on all displays</p>
    </div>

    <div id="slaveView" class="slave-view">
        <img id="memeImg" src="" alt="Display Screen" class="fullscreen-image">
        
        <div id="preloaderContainer"></div>
        
        <button class="fullscreen-toggle-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <script>
        const MAX_SCAN_LIMIT = 100; 
        const defaultImage = "meme.jpg";

        const drone = new Scaledrone('ObXNBHan6Vjhwfha'); 
        const roomName = 'observable-meme-room';
        let room;

        let validImagesFound = ["1.png"]; 
        let currentPrankImage = null;

        function initRole(role) {
            document.getElementById('setupScreen').style.display = 'none';
            
            room = drone.subscribe(roomName);

            room.on('open', error => {
                if (error) {
                    alert("Scaledrone Room Error: " + error);
                    return;
                }
                
                if (role === 'master') {
                    setupMaster();
                } else {
                    setupSlave();
                }
            });
        }

        // --- HOST CONTROLLER SYSTEM ---
        function setupMaster() {
            document.getElementById('masterPanel').style.display = 'flex';
            const prankBtn = document.getElementById('prankBtn');

            // Sync with any display client that broadcasts its active file list
            room.on('message', message => {
                if (message.data.action === 'SYNC_LIST') {
                    // Combine lists if multiple clients find different setups, keeping unique items
                    validImagesFound = [...new Set([...validImagesFound, ...message.data.list])];
                }
            });

            const startPrank = () => {
                const randomIndex = Math.floor(Math.random() * validImagesFound.length);
                const randomPng = validImagesFound[randomIndex];
                
                drone.publish({
                    room: roomName,
                    message: { action: 'TRIGGER', img: randomPng }
                });
            };

            const stopPrank = () => {
                drone.publish({
                    room: roomName,
                    message: { action: 'RESET' }
                });
            };

            prankBtn.addEventListener('mousedown', startPrank);
            prankBtn.addEventListener('mouseup', stopPrank);
            prankBtn.addEventListener('mouseleave', stopPrank);
            
            prankBtn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                startPrank(); 
            });
            prankBtn.addEventListener('touchend', stopPrank);
        }

        // --- DISPLAY CLIENT SYSTEM ---
        function setupSlave() {
            document.getElementById('slaveView').style.display = 'block';
            const imageElement = document.getElementById('memeImg');

            imageElement.src = defaultImage;

            scanAndRefreshAssets();

            // Background scanning fires automatically every 60 seconds
            setInterval(() => {
                scanAndRefreshAssets();
            }, 60000);

            room.on('message', message => {
                const data = message.data;
                
                if (data.action === 'TRIGGER') {
                    currentPrankImage = data.img;
                    imageElement.src = currentPrankImage;
                } else if (data.action === 'RESET') {
                    currentPrankImage = null;
                    imageElement.src = defaultImage + "?t=" + new Date().getTime();
                }
            });
        }

        // Brute-force scan engine covering paths 1.png through 100.png safely
        function scanAndRefreshAssets() {
            const preloaderContainer = document.getElementById('preloaderContainer');
            const imageElement = document.getElementById('memeImg');
            const timestamp = "?t=" + new Date().getTime();
            
            preloaderContainer.innerHTML = '';
            let discoveredList = [];
            let checksCompleted = 0;

            for (let i = 1; i <= MAX_SCAN_LIMIT; i++) {
                const filename = i + ".png";
                const imgCheck = new Image();
                
                imgCheck.onload = function() {
                    discoveredList.push(filename);
                    const cacheBusterImg = new Image();
                    cacheBusterImg.src = filename + timestamp;
                    preloaderContainer.appendChild(cacheBusterImg);
                    
                    checkFinished();
                };
                
                imgCheck.onerror = function() {
                    checkFinished();
                };

                imgCheck.src = filename + timestamp;
            }

            function checkFinished() {
                checksCompleted++;
                if (checksCompleted === MAX_SCAN_LIMIT) {
                    if (discoveredList.length === 0) discoveredList = ["1.png"];
                    
                    discoveredList.sort((a, b) => parseInt(a) - parseInt(b));
                    validImagesFound = discoveredList;

                    // Tell the controller (and any other client screens) what files are ready to rock
                    drone.publish({
                        room: roomName,
                        message: { action: 'SYNC_LIST', list: validImagesFound }
                    });

                    if (!currentPrankImage) {
                        imageElement.src = defaultImage + timestamp;
                    }
                }
            }
        }

        // --- FULLSCREEN LOGIC ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>

</body>
</html>
