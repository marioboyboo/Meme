<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVault - Remote Control</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        html, body { width: 100%; height: 100%; background-color: #121212; font-family: sans-serif; color: #fff; overflow: hidden; }
        
        /* Master Panel */
        .master-panel { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; background: #1e1e1e; }
        .btn-container { display: flex; gap: 20px; }
        .prank-btn { width: 180px; height: 180px; border-radius: 50%; border: none; background: #ff4500; color: white; font-weight: bold; cursor: pointer; }
        .choose-btn { width: 180px; height: 180px; border-radius: 50%; border: none; background: #333; color: white; font-weight: bold; cursor: pointer; }
        
        /* Modal Popup */
        #memeModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .grid img { width: 100%; cursor: pointer; border: 2px solid transparent; }
        .grid img:hover { border: 2px solid #ff4500; }

        /* Display View */
        .slave-view { display: none; width: 100%; height: 100%; background: black; }
        .fullscreen-image { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div id="setupScreen" style="height:100%; display:flex; justify-content:center; align-items:center;">
        <button onclick="initRole('master')">Host</button>
        <button onclick="initRole('slave')">Client</button>
    </div>

    <div id="masterPanel" class="master-panel">
        <div class="btn-container">
            <button id="prankBtn" class="prank-btn">RANDOM</button>
            <button id="chooseBtn" class="choose-btn">CHOOSE</button>
        </div>
    </div>

    <div id="memeModal">
        <h2 style="margin-bottom:20px;">Select a Meme</h2>
        <div id="memeGrid" class="grid"></div>
    </div>

    <div id="slaveView" class="slave-view">
        <img id="memeImg" src="meme.jpg" class="fullscreen-image">
    </div>

    <script>
        const MAX_SCAN = 100;
        const drone = new Scaledrone('ObXNBHan6Vjhwfha');
        let validImages = ["1.png"];

        function initRole(role) {
            document.getElementById('setupScreen').style.display = 'none';
            const room = drone.subscribe('observable-meme-room');
            
            if(role === 'master') setupMaster(room);
            else setupSlave(room);
        }

        function setupMaster(room) {
            document.getElementById('masterPanel').style.display = 'flex';
            
            // Sync image list
            room.on('message', m => { if(m.data.action === 'SYNC') validImages = m.data.list; });

            // Random Button
            document.getElementById('prankBtn').onmousedown = () => {
                const img = validImages[Math.floor(Math.random() * validImages.length)];
                room.publish({ room: 'observable-meme-room', message: { action: 'TRIGGER', img } });
            };
            document.getElementById('prankBtn').onmouseup = () => room.publish({ room: 'observable-meme-room', message: { action: 'RESET' } });

            // Choose Button (Open Modal)
            document.getElementById('chooseBtn').onclick = () => {
                const grid = document.getElementById('memeGrid');
                grid.innerHTML = '';
                validImages.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.onclick = () => {
                        room.publish({ room: 'observable-meme-room', message: { action: 'TRIGGER', img: src } });
                        document.getElementById('memeModal').style.display = 'none';
                    };
                    grid.appendChild(img);
                });
                document.getElementById('memeModal').style.display = 'block';
            };
        }

        function setupSlave(room) {
            document.getElementById('slaveView').style.display = 'block';
            const imgEl = document.getElementById('memeImg');
            
            // Scan and Sync
            let found = [];
            for(let i=1; i<=MAX_SCAN; i++) {
                let img = new Image();
                img.onload = () => { found.push(i+'.png'); room.publish({room:'observable-meme-room', message:{action:'SYNC', list:found}}); };
                img.src = i+'.png';
            }

            room.on('message', m => {
                if(m.data.action === 'TRIGGER') imgEl.src = m.data.img;
                else imgEl.src = 'meme.jpg';
            });
        }
    </script>
</body>
</html>
