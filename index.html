<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVault - Remote Control</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* Setup Menu */
        .setup-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .setup-screen h1 {
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        .role-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .master-btn { background-color: #ff4500; color: white; }
        .slave-btn { background-color: #00ffcc; color: #121212; }

        /* Host Panel */
        .master-panel {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #1e1e1e;
            gap: 25px;
        }

        .prank-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: #ff4500;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.4);
            -webkit-user-drag: none;
        }

        .choose-btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #333;
            color: #fff;
            border: 2px solid #555;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .choose-btn:hover {
            background-color: #444;
            border-color: #00ffcc;
        }

        .status-text {
            color: #888;
            font-size: 0.9rem;
            text-align: center;
            max-width: 80%;
        }

        /* Popup Selection Overlay Split Screen */
        .popup-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20;
            flex-direction: column;
            padding: 20px;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            gap: 15px;
        }

        .close-popup-btn {
            padding: 8px 16px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Sticky Control Header Box */
        .sticky-status-bar {
            flex: 1;
            background: #111;
            border: 2px dashed #333;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            transition: all 0.2s ease;
        }

        .sticky-status-bar.locked {
            background: #00ffcc;
            color: #121212;
            border-style: solid;
            border-color: #00ffcc;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        /* Split Window Layout Panels */
        .vault-split-container {
            display: flex;
            flex-direction: column;
            height: calc(100% - 75px);
            gap: 15px;
            margin-top: 15px;
        }

        .vault-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .vault-section h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid-container {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 12px;
            padding-right: 5px;
        }

        /* Visual Action Cards */
        .grid-item {
            background: #252525;
            border: 2px solid #3c3c3c;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .grid-item:active, .grid-item.active {
            border-color: #00ffcc;
            background: #2a2a2a;
        }

        .grid-item.sticky-active {
            border-color: #ff4500 !important;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
        }

        .grid-item img {
            width: 100%;
            height: 75px;
            object-fit: cover;
            pointer-events: none;
        }

        .audio-icon-box {
            width: 100%;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1b1b1b;
            font-size: 2rem;
            color: #ff4500;
            pointer-events: none;
        }

        .grid-item span {
            font-size: 0.75rem;
            padding: 6px;
            color: #aaa;
            font-weight: bold;
            pointer-events: none;
        }

        /* Display View */
        .slave-view {
            display: none;
            width: 100%;
            height: 100%;
            background: black;
            position: relative;
        }

        .fullscreen-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            -webkit-user-drag: none;
        }

        .fullscreen-toggle-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 16px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
        }

        #preloaderContainer {
            display: none;
        }
    </style>
</head>
<body>

    <div id="setupScreen" class="setup-screen">
        <h1>Select View</h1>
        <div class="btn-group">
            <button class="role-btn master-btn" onclick="initRole('master')">Host Controller</button>
            <button class="role-btn slave-btn" onclick="initRole('slave')">Display Client</button>
        </div>
    </div>

    <div id="masterPanel" class="master-panel">
        <button id="prankBtn" class="prank-btn" oncontextmenu="return false;">PRANK</button>
        <button class="choose-btn" onclick="openPopup()">📁 CHOOSE MEME / AUDIO</button>
        <p class="status-text">Hold down PRANK for random, or open the vault to pick items</p>
    </div>

    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-header">
            <button class="close-popup-btn" onclick="closePopup()">Close</button>
            
            <div id="statusBar" class="sticky-status-bar" onclick="clearAllLocks()">
                Double-tap cards to Lock | Click here to Stop All
            </div>
        </div>
        <div class="vault-split-container">
            
            <div class="vault-section">
                <h3>🖼️ Specific Meme Images</h3>
                <div id="imageGridContainer" class="grid-container"></div>
            </div>

            <div class="vault-section">
                <h3>🔊 Specific MP3 Audio Tracks</h3>
                <div id="audioGridContainer" class="grid-container"></div>
            </div>

        </div>
    </div>

    <div id="slaveView" class="slave-view">
        <img id="memeImg" src="" alt="Display Screen" class="fullscreen-image" oncontextmenu="return false;">
        <div id="preloaderContainer"></div>
        <button class="fullscreen-toggle-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <script>
        const MAX_SCAN_LIMIT = 100; 
        const BATCH_SIZE = 10; // Number of simultaneous network checks allowed at one time
        const defaultImage = "meme.jpg";

        const drone = new Scaledrone('ObXNBHan6Vjhwfha'); 
        const roomName = 'observable-meme-room';
        let room;

        let validImagesFound = []; 
        let validAudioFound = []; 
        let currentPrankImage = null;

        let currentStickyImg = null;
        let currentStickyAudio = null;
        let isScanning = false;

        function initRole(role) {
            document.getElementById('setupScreen').style.display = 'none';
            room = drone.subscribe(roomName);

            room.on('open', error => {
                if (error) return alert("Scaledrone Error: " + error);
                if (role === 'master') setupMaster(); else setupSlave();
            });
        }

        // --- HOST CONTROLLER SYSTEM ---
        function setupMaster() {
            document.getElementById('masterPanel').style.display = 'flex';
            const prankBtn = document.getElementById('prankBtn');

            room.on('message', message => {
                if (message.data.action === 'SYNC_LIST') {
                    validImagesFound = message.data.images;
                    validAudioFound = message.data.audio;
                    buildPopupGrids();
                }
            });

            triggerTargetAction('REQUEST_SYNC', true);

            const startPrank = (e) => {
                if (e) e.preventDefault();
                if (currentStickyImg) return;
                if (validImagesFound.length === 0) return;
                const randomIndex = Math.floor(Math.random() * validImagesFound.length);
                triggerTargetAction('TRIGGER', validImagesFound[randomIndex]);
            };

            const stopPrank = (e) => {
                if (e) e.preventDefault();
                if (currentStickyImg) return;
                resetTargetAction('RESET_IMAGE');
            };

            prankBtn.addEventListener('mousedown', startPrank);
            window.addEventListener('mouseup', stopPrank);
            
            prankBtn.addEventListener('touchstart', startPrank, { passive: false });
            prankBtn.addEventListener('touchend', stopPrank, { passive: false });
            prankBtn.addEventListener('touchcancel', stopPrank, { passive: false });

            buildPopupGrids();
        }

        function triggerTargetAction(actionType, assetName) {
            drone.publish({
                room: roomName,
                message: { action: actionType, file: assetName }
            });
        }

        function resetTargetAction(resetType) {
            drone.publish({
                room: roomName,
                message: { action: resetType }
            });
        }

        function setStickyLock(type, filename) {
            if (type === 'TRIGGER') {
                currentStickyImg = filename;
            } else {
                currentStickyAudio = filename;
            }
            updateStatusBarUI();
            buildPopupGrids();
            triggerTargetAction(type, filename);
        }

        function clearSingleLock(type) {
            if (type === 'TRIGGER') {
                currentStickyImg = null;
                resetTargetAction('RESET_IMAGE');
            } else {
                currentStickyAudio = null;
                resetTargetAction('RESET_AUDIO');
            }
            updateStatusBarUI();
            buildPopupGrids();
        }

        function clearAllLocks() {
            currentStickyImg = null;
            currentStickyAudio = null;
            updateStatusBarUI();
            buildPopupGrids();
            resetTargetAction('RESET_ALL');
        }

        function updateStatusBarUI() {
            const bar = document.getElementById('statusBar');
            if (currentStickyImg || currentStickyAudio) {
                bar.className = 'sticky-status-bar locked';
                let txt = "🛑 STOP: ";
                if (currentStickyImg) txt += `[${currentStickyImg}] `;
                if (currentStickyAudio) txt += `[${currentStickyAudio}]`;
                bar.innerText = txt;
            } else {
                bar.className = 'sticky-status-bar';
                bar.innerText = 'Double-tap cards to Lock | Click here to Stop All';
            }
        }

        // --- POPUP INTERACTION GENERATOR ---
        function openPopup() {
            buildPopupGrids();
            document.getElementById('popupOverlay').style.display = 'flex';
            triggerTargetAction('REQUEST_SYNC', true);
        }

        function closePopup() {
            document.getElementById('popupOverlay').style.display = 'none';
        }

        function buildPopupGrids() {
            const imgGrid = document.getElementById('imageGridContainer');
            const audioGrid = document.getElementById('audioGridContainer');
            if (!imgGrid || !audioGrid) return;

            const timestamp = "?t=" + new Date().getTime();

            // 1. POPULATE IMAGES
            imgGrid.innerHTML = '';
            validImagesFound.forEach(imgFile => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                if (currentStickyImg === imgFile) item.className = 'grid-item sticky-active';

                const img = document.createElement('img');
                img.src = imgFile + timestamp;
                const label = document.createElement('span');
                label.innerText = imgFile;
                item.appendChild(img);
                item.appendChild(label);

                attachHoldAndDoubleTapListeners(item, 'TRIGGER', imgFile, () => currentStickyImg);
                imgGrid.appendChild(item);
            });

            // 2. POPULATE AUDIO
            audioGrid.innerHTML = '';
            validAudioFound.forEach(audioFile => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                if (currentStickyAudio === audioFile) item.className = 'grid-item sticky-active';

                const iconBox = document.createElement('div');
                iconBox.className = 'audio-icon-box';
                iconBox.innerText = '🎵';
                const label = document.createElement('span');
                label.innerText = audioFile;
                item.appendChild(iconBox);
                item.appendChild(label);

                attachHoldAndDoubleTapListeners(item, 'TRIGGER_AUDIO', audioFile, () => currentStickyAudio);
                audioGrid.appendChild(item);
            });
        }

        function attachHoldAndDoubleTapListeners(element, type, file, getStickyState) {
            let lastTap = 0;
            let touchActive = false;

            const isImage = (type === 'TRIGGER');
            const resetCommand = isImage ? 'RESET_IMAGE' : 'RESET_AUDIO';

            const pressStart = (e) => {
                if (e) e.preventDefault();
                if (getStickyState()) return; 
                touchActive = true;
                element.classList.add('active');
                triggerTargetAction(type, file);
            };

            const pressEnd = (e) => {
                if (e) e.preventDefault();
                if (!touchActive) return;
                touchActive = false;
                element.classList.remove('active');
                if (!getStickyState()) resetTargetAction(resetCommand);
            };

            const handleTapLock = (e) => {
                if (e) e.preventDefault();
                const now = new Date().getTime();
                const timesince = now - lastTap;
                
                if (timesince < 300 && timesince > 0) {
                    if (getStickyState() === file) {
                        clearSingleLock(type);
                    } else {
                        setStickyLock(type, file);
                    }
                }
                lastTap = now;
            };

            element.addEventListener('mousedown', (e) => { handleTapLock(e); pressStart(e); });
            element.addEventListener('mouseup', pressEnd);
            element.addEventListener('mouseleave', pressEnd);

            element.addEventListener('touchstart', (e) => { handleTapLock(e); pressStart(e); }, { passive: false });
            element.addEventListener('touchend', pressEnd, { passive: false });
            element.addEventListener('touchcancel', pressEnd, { passive: false });
        }

        // --- DISPLAY CLIENT SYSTEM ---
        function setupSlave() {
            document.getElementById('slaveView').style.display = 'block';
            const imageElement = document.getElementById('memeImg');
            imageElement.src = defaultImage;

            let activeAudioTrack = null;

            scanAndRefreshAssets();
            setInterval(scanAndRefreshAssets, 60000);

            room.on('message', message => {
                const data = message.data;
                
                if (data.action === 'REQUEST_SYNC') {
                    scanAndRefreshAssets();
                }
                else if (data.action === 'TRIGGER') {
                    currentPrankImage = data.file;
                    imageElement.src = currentPrankImage;
                } 
                else if (data.action === 'RESET_IMAGE') {
                    currentPrankImage = null;
                    imageElement.src = defaultImage + "?t=" + new Date().getTime();
                }
                else if (data.action === 'TRIGGER_AUDIO') {
                    if (activeAudioTrack) {
                        activeAudioTrack.pause();
                    }
                    activeAudioTrack = new Audio(data.file + "?t=" + new Date().getTime());
                    activeAudioTrack.play().catch(err => console.log(err));
                } 
                else if (data.action === 'RESET_AUDIO') {
                    if (activeAudioTrack) {
                        activeAudioTrack.pause();
                        activeAudioTrack = null;
                    }
                }
                else if (data.action === 'RESET_ALL') {
                    if (activeAudioTrack) {
                        activeAudioTrack.pause();
                        activeAudioTrack = null;
                    }
                    currentPrankImage = null;
                    imageElement.src = defaultImage + "?t=" + new Date().getTime();
                }
            });
        }

        // Safe Batch-by-Batch Scanner to prevent browsers dropping requests
        function scanAndRefreshAssets() {
            if (isScanning) return;
            isScanning = true;

            const preloaderContainer = document.getElementById('preloaderContainer');
            const imageElement = document.getElementById('memeImg');
            const timestamp = "?t=" + new Date().getTime();
            
            preloaderContainer.innerHTML = '';
            let discoveredImages = [];
            let discoveredAudio = [];
            
            let currentIndex = 1;

            function processNextBatch() {
                if (currentIndex > MAX_SCAN_LIMIT) {
                    // All 100 items checked safely! Wrap up.
                    if (discoveredImages.length === 0) discoveredImages = ["1.png"];
                    discoveredImages.sort((a, b) => parseInt(a) - parseInt(b));
                    discoveredAudio.sort((a, b) => parseInt(a) - parseInt(b));

                    validImagesFound = discoveredImages;
                    validAudioFound = discoveredAudio;

                    drone.publish({
                        room: roomName,
                        message: { action: 'SYNC_LIST', images: validImagesFound, audio: validAudioFound }
                    });

                    if (!currentPrankImage && imageElement) {
                        imageElement.src = defaultImage + timestamp;
                    }
                    isScanning = false;
                    return;
                }

                let checksInThisBatch = 0;
                let targetsExpected = 0;

                const onTargetChecked = () => {
                    checksInThisBatch++;
                    if (checksInThisBatch === targetsExpected) {
                        currentIndex += BATCH_SIZE;
                        processNextBatch(); // Move safely to the next group of 10
                    }
                };

                // Limit lookups to small safe ranges
                let endLimit = Math.min(currentIndex + BATCH_SIZE - 1, MAX_SCAN_LIMIT);
                targetsExpected = (endLimit - currentIndex + 1) * 2;

                for (let i = currentIndex; i <= endLimit; i++) {
                    // Check Image
                    const imgFilename = i + ".png";
                    const imgCheck = new Image();
                    imgCheck.onload = function() {
                        discoveredImages.push(imgFilename);
                        const preload = new Image(); preload.src = imgFilename + timestamp;
                        preloaderContainer.appendChild(preload);
                        onTargetChecked();
                    };
                    imgCheck.onerror = onTargetChecked;
                    imgCheck.src = imgFilename + timestamp;

                    // Check Audio Track
                    const audioFilename = i + ".mp3";
                    const audioCheck = new Audio();
                    audioCheck.oncanplaythrough = function() {
                        if (!discoveredAudio.includes(audioFilename)) discoveredAudio.push(audioFilename);
                        onTargetChecked();
                    };
                    audioCheck.onerror = onTargetChecked;
                    audioCheck.src = audioFilename + timestamp;
                }
            }

            processNextBatch();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
