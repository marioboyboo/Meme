<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVault - Remote Control</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* Setup Menu */
        .setup-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .setup-screen h1 {
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        .role-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .master-btn { background-color: #ff4500; color: white; }
        .slave-btn { background-color: #00ffcc; color: #121212; }

        /* Host Panel */
        .master-panel {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #1e1e1e;
            gap: 20px;
        }

        .prank-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: none;
            background: #ff4500;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.4);
        }

        .action-button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }

        .jumpscare-btn, .banana-btn, .kungfu-btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: 3px solid #fff;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .jumpscare-btn { background-color: #ff0000; color: white; box-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }
        .banana-btn { background-color: #e6b800; color: #121212; box-shadow: 0 0 15px rgba(230, 184, 0, 0.6); }
        .kungfu-btn { background-color: #ffffff; color: #121212; border-color: #ff4500; box-shadow: 0 0 15px rgba(255, 69, 0, 0.4); }

        .jumpscare-btn:active, .banana-btn:active, .kungfu-btn:active { transform: scale(0.95); }

        .choose-btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #333;
            color: #fff;
            border: 2px solid #555;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .choose-btn:hover { background-color: #444; border-color: #00ffcc; }
        .status-text { color: #888; font-size: 0.9rem; text-align: center; max-width: 80%; }

        /* Vault Selection Pop-up Overlay */
        .popup-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20;
            flex-direction: column;
            padding: 20px;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            gap: 15px;
        }

        .close-popup-btn {
            padding: 8px 16px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .sticky-status-bar {
            flex: 1;
            background: #111;
            border: 2px dashed #333;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            transition: all 0.2s ease;
        }

        .sticky-status-bar.locked {
            background: #00ffcc;
            color: #121212;
            border-style: solid;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .vault-split-container {
            display: flex;
            flex-direction: column;
            height: calc(100% - 75px);
            gap: 15px;
            margin-top: 15px;
            overflow-y: auto;
        }

        .vault-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 180px;
            margin-bottom: 5px;
        }

        .vault-section h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid-container {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 12px;
            padding-right: 5px;
        }

        .grid-item {
            background: #252525;
            border: 2px solid #3c3c3c;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .grid-item:active, .grid-item.active { border-color: #00ffcc; background: #2a2a2a; }
        .grid-item.sticky-active { border-color: #ff4500 !important; box-shadow: 0 0 10px rgba(255, 69, 0, 0.5); }
        .grid-item img { width: 100%; height: 75px; object-fit: cover; pointer-events: none; }

        .audio-icon-box, .song-icon-box {
            width: 100%; height: 75px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; pointer-events: none;
        }
        .audio-icon-box { background: #1b1b1b; color: #ff4500; }
        .song-icon-box { background: #112222; color: #00ffcc; }

        .grid-item span { font-size: 0.75rem; padding: 6px; color: #aaa; font-weight: bold; pointer-events: none; text-align: center; }

        /* Display Panel View */
        .slave-view {
            display: none;
            width: 100%;
            height: 100%;
            background: black;
            position: relative;
        }

        .fullscreen-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .strobe-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; 
            pointer-events: none;
        }

        @keyframes flashEffect {
            0% { background-color: #ff0000; }
            50% { background-color: #ffffff; }
            100% { background-color: #ff0000; }
        }

        .strobe-overlay.active {
            display: block;
            animation: flashEffect 0.03s infinite;
        }

        .fullscreen-toggle-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 16px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
        }

        #preloaderContainer { display: none; }
    </style>
</head>
<body>

    <div id="setupScreen" class="setup-screen">
        <h1>Select View</h1>
        <div class="btn-group">
            <button class="role-btn master-btn" onclick="initRole('master')">Host Controller</button>
            <button class="role-btn slave-btn" onclick="initRole('slave')">Display Client</button>
        </div>
    </div>

    <div id="masterPanel" class="master-panel">
        <button id="prankBtn" class="prank-btn" oncontextmenu="return false;">PRANK</button>
        <div class="action-button-row">
            <button class="jumpscare-btn" onclick="triggerJumpscare()">⚡ JUMPSCARE</button>
            <button class="banana-btn" onclick="triggerBanana()">🍌 OOOH BANANA</button>
            <button class="kungfu-btn" onclick="triggerKungFu()">🥋 KUNG FU</button>
        </div>
        <button class="choose-btn" onclick="openPopup()">📁 CHOOSE MEME / AUDIO</button>
        <p class="status-text">Hold down PRANK for random, use buttons for events, or open vault</p>
    </div>

    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-header">
            <button class="close-popup-btn" onclick="closePopup()">Close</button>
            <div id="statusBar" class="sticky-status-bar" onclick="clearAllLocks()">
                Double-tap cards to Lock | Click here to Stop All
            </div>
        </div>
        <div class="vault-split-container">
            <div class="vault-section">
                <h3>🖼️ Specific Meme Images</h3>
                <div id="imageGridContainer" class="grid-container"></div>
            </div>
            <div class="vault-section">
                <h3>🔊 Quick SFX Tracks</h3>
                <div id="audioGridContainer" class="grid-container"></div>
            </div>
            <div class="vault-section">
                <h3>🎵 Full Music Songs</h3>
                <div id="songGridContainer" class="grid-container"></div>
            </div>
        </div>
    </div>

    <div id="slaveView" class="slave-view">
        <div id="strobeOverlay" class="strobe-overlay"></div>
        <img id="memeImg" src="" alt="Display Screen" class="fullscreen-image" oncontextmenu="return false;">
        <div id="preloaderContainer"></div>
        <button class="fullscreen-toggle-btn" onclick="toggleFullscreen(event)">⛶ Fullscreen</button>
    </div>

    <script>
        const defaultImage = "meme.jpg";

        const IS_LOCAL = window.location.protocol === 'file:';
        const BASE_URL = IS_LOCAL ? "" : window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);

        const drone = new Scaledrone('ObXNBHan6Vjhwfha'); 
        const roomName = 'observable-meme-room';
        let room;

        let validImagesFound = []; 
        let validAudioFound = []; 
        let validSongsFound = [];
        let currentPrankImage = null;

        let currentStickyImg = null;
        let currentStickyAudio = null;
        let currentStickySong = null; 

        let jumpscareTrack = new Audio();
        let currentJumpscarePhase = 0; 

        let audioCtx = null;
        let gainNode = null;
        let sourceNode = null;
        let flexibleAudioTrack = null; 

        function initRole(role) {
            document.getElementById('setupScreen').remove(); 
            room = drone.subscribe(roomName);

            room.on('open', error => {
                if (error) return alert("Scaledrone Error: " + error);
                if (role === 'master') setupMaster(); else setupSlave();
            });
        }

        // --- HOST CONTROLLER SYSTEM ---
        function setupMaster() {
            document.getElementById('masterPanel').style.display = 'flex';
            const prankBtn = document.getElementById('prankBtn');

            room.on('message', message => {
                if (message.data.action === 'SYNC_LIST') {
                    validImagesFound = message.data.images || [];
                    validAudioFound = message.data.audio || [];
                    validSongsFound = message.data.songs || [];
                    buildPopupGrids();
                }
            });

            triggerTargetAction('REQUEST_SYNC', true);

            const startPrank = (e) => {
                if (e) e.preventDefault();
                if (currentStickyImg) return;
                if (validImagesFound.length === 0) return;
                const randomIndex = Math.floor(Math.random() * validImagesFound.length);
                triggerTargetAction('TRIGGER', validImagesFound[randomIndex]);
            };

            const stopPrank = (e) => {
                if (e) e.preventDefault();
                if (currentStickyImg) return;
                resetTargetAction('RESET_IMAGE');
            };

            prankBtn.addEventListener('mousedown', startPrank);
            window.addEventListener('mouseup', stopPrank);
            prankBtn.addEventListener('touchstart', startPrank, { passive: false });
            prankBtn.addEventListener('touchend', stopPrank, { passive: false });
            prankBtn.addEventListener('touchcancel', stopPrank, { passive: false });

            buildPopupGrids();
        }

        function triggerJumpscare() { triggerTargetAction('START_JUMPSCARE', true); }
        function triggerBanana() { triggerTargetAction('START_BANANA', true); }
        function triggerKungFu() { triggerTargetAction('START_KUNGFU', true); }

        function triggerTargetAction(actionType, assetName) {
            drone.publish({ room: roomName, message: { action: actionType, file: assetName } });
        }

        function resetTargetAction(resetType) {
            drone.publish({ room: roomName, message: { action: resetType } });
        }

        function openPopup() {
            buildPopupGrids();
            document.getElementById('popupOverlay').style.display = 'flex';
            triggerTargetAction('REQUEST_SYNC', true);
        }

        // Fix logic where closed overlay retains sync layout updates
        function closePopup() { document.getElementById('popupOverlay').style.display = 'none'; }

        function buildPopupGrids() {
            const imgGrid = document.getElementById('imageGridContainer');
            const audioGrid = document.getElementById('audioGridContainer');
            const songGrid = document.getElementById('songGridContainer');
            if (!imgGrid || !audioGrid || !songGrid) return;

            const timestamp = "?t=" + new Date().getTime();

            // 1. Meme Images Layout
            imgGrid.innerHTML = '';
            validImagesFound.forEach(imgFile => {
                const item = document.createElement('div');
                item.className = currentStickyImg === imgFile ? 'grid-item sticky-active' : 'grid-item';
                const img = document.createElement('img');
                img.src = BASE_URL + imgFile + timestamp;
                const label = document.createElement('span');
                label.innerText = imgFile;
                item.appendChild(img);
                item.appendChild(label);
                attachHoldAndDoubleTapListeners(item, 'TRIGGER', imgFile, () => currentStickyImg);
                imgGrid.appendChild(item);
            });

            // 2. Sound Effects Layout
            audioGrid.innerHTML = '';
            validAudioFound.forEach(audioFile => {
                const item = document.createElement('div');
                item.className = currentStickyAudio === audioFile ? 'grid-item sticky-active' : 'grid-item';
                const iconBox = document.createElement('div');
                iconBox.className = 'audio-icon-box';
                iconBox.innerText = '🔊';
                const label = document.createElement('span');
                label.innerText = audioFile;
                item.appendChild(iconBox);
                item.appendChild(label);
                attachHoldAndDoubleTapListeners(item, 'TRIGGER_AUDIO', audioFile, () => currentStickyAudio);
                audioGrid.appendChild(item);
            });

            // 3. Music Songs Section Layout
            songGrid.innerHTML = '';
            validSongsFound.forEach(songFile => {
                const item = document.createElement('div');
                item.className = currentStickySong === songFile ? 'grid-item sticky-active' : 'grid-item';
                const iconBox = document.createElement('div');
                iconBox.className = 'song-icon-box';
                iconBox.innerText = '🎵';
                const label = document.createElement('span');
                label.innerText = songFile;
                item.appendChild(iconBox);
                item.appendChild(label);
                attachHoldAndDoubleTapListeners(item, 'TRIGGER_SONG', songFile, () => currentStickySong);
                songGrid.appendChild(item);
            });
        }

        function attachHoldAndDoubleTapListeners(element, type, file, getStickyState) {
            let lastTap = 0;
            let touchActive = false;
            
            const pressStart = (e) => {
                if (e) e.preventDefault();
                if (getStickyState()) return; 
                touchActive = true;
                element.classList.add('active');
                triggerTargetAction(type, file);
            };

            const pressEnd = (e) => {
                if (e) e.preventDefault();
                if (!touchActive) return;
                touchActive = false;
                element.classList.remove('active');
                if (!getStickyState()) {
                    const resetCommand = (type === 'TRIGGER') ? 'RESET_IMAGE' : 'RESET_AUDIO';
                    resetTargetAction(resetCommand);
                }
            };

            const handleTapLock = (e) => {
                if (e) e.preventDefault();
                const now = new Date().getTime();
                const timesince = now - lastTap;
                if (timesince < 300 && timesince > 0) {
                    if (getStickyState() === file) clearSingleLock(type);
                    else setStickyLock(type, file);
                }
                lastTap = now;
            };

            element.addEventListener('mousedown', (e) => { handleTapLock(e); pressStart(e); });
            element.addEventListener('mouseup', pressEnd);
            element.addEventListener('mouseleave', pressEnd);
            element.addEventListener('touchstart', (e) => { handleTapLock(e); pressStart(e); }, { passive: false });
            element.addEventListener('touchend', pressEnd, { passive: false });
            element.addEventListener('touchcancel', pressEnd, { passive: false });
        }

        function setStickyLock(type, filename) {
            if (type === 'TRIGGER') currentStickyImg = filename;
            else if (type === 'TRIGGER_AUDIO') currentStickyAudio = filename;
            else if (type === 'TRIGGER_SONG') currentStickySong = filename;
            
            updateStatusBarUI();
            buildPopupGrids();
            triggerTargetAction(type, filename);
        }

        function clearSingleLock(type) {
            if (type === 'TRIGGER') { currentStickyImg = null; resetTargetAction('RESET_IMAGE'); }
            else if (type === 'TRIGGER_AUDIO') { currentStickyAudio = null; resetTargetAction('RESET_AUDIO'); }
            else if (type === 'TRIGGER_SONG') { currentStickySong = null; resetTargetAction('RESET_AUDIO'); }
            updateStatusBarUI();
            buildPopupGrids();
        }

        function clearAllLocks() {
            currentStickyImg = null;
            currentStickyAudio = null;
            currentStickySong = null;
            updateStatusBarUI();
            buildPopupGrids();
            resetTargetAction('RESET_ALL');
        }

        function updateStatusBarUI() {
            const bar = document.getElementById('statusBar');
            if (currentStickyImg || currentStickyAudio || currentStickySong) {
                bar.className = 'sticky-status-bar locked';
                bar.innerText = `🛑 STOP: [${currentStickyImg || ''}] [${currentStickyAudio || ''}] [${currentStickySong || ''}]`;
            } else {
                bar.className = 'sticky-status-bar';
                bar.innerText = 'Double-tap cards to Lock | Click here to Stop All';
            }
        }

        // --- DISPLAY CLIENT SYSTEM ---
        function setupSlave() {
            const slavePanel = document.getElementById('slaveView');
            slavePanel.style.display = 'block';
            const imageElement = document.getElementById('memeImg');
            imageElement.src = BASE_URL + defaultImage;

            let jumpscareTimeout = null;

            scanAndRefreshAssets();
            setInterval(scanAndRefreshAssets, 45000);

            const stopAllAudioAndEffects = () => {
                jumpscareTrack.pause();
                currentJumpscarePhase = 0;
                if (gainNode) gainNode.gain.value = 1.0; 
                if (flexibleAudioTrack) { flexibleAudioTrack.pause(); flexibleAudioTrack = null; }
                if (jumpscareTimeout) { clearTimeout(jumpscareTimeout); jumpscareTimeout = null; }
                document.getElementById('strobeOverlay').classList.remove('active');
            };

            jumpscareTrack.onended = function() {
                const timestamp = "?t=" + new Date().getTime();
                if (currentJumpscarePhase === 5) {
                    jumpscareTimeout = setTimeout(() => {
                        currentJumpscarePhase = 4;
                        document.getElementById('strobeOverlay').classList.add('active');
                        if (gainNode) gainNode.gain.value = 5.0; 
                        jumpscareTrack.src = BASE_URL + "4.mp3" + timestamp;
                        jumpscareTrack.play().catch(e => console.log(e));
                    }, 1000);
                } else if (currentJumpscarePhase === 4) {
                    document.getElementById('strobeOverlay').classList.remove('active');
                    if (gainNode) gainNode.gain.value = 1.0; 
                    currentJumpscarePhase = 0;
                } else if (currentJumpscarePhase === 8 || currentJumpscarePhase === 9) {
                    imageElement.src = BASE_URL + defaultImage + timestamp;
                    currentJumpscarePhase = 0;
                }
            };

            room.on('message', message => {
                const data = message.data;
                const timestamp = "?t=" + new Date().getTime();
                
                if (data.action === 'REQUEST_SYNC') {
                    scanAndRefreshAssets();
                }
                else if (data.action === 'START_JUMPSCARE') {
                    stopAllAudioAndEffects();
                    currentJumpscarePhase = 5;
                    jumpscareTrack.src = BASE_URL + "5.mp3" + timestamp;
                    jumpscareTrack.play().catch(err => console.log(err));
                }
                else if (data.action === 'START_BANANA') {
                    stopAllAudioAndEffects();
                    currentJumpscarePhase = 8; 
                    imageElement.src = BASE_URL + "oh banana.png" + timestamp;
                    jumpscareTrack.src = BASE_URL + "1.mp3" + timestamp;
                    jumpscareTrack.play().catch(err => console.log(err));
                }
                else if (data.action === 'START_KUNGFU') {
                    stopAllAudioAndEffects();
                    currentJumpscarePhase = 9; 
                    imageElement.src = BASE_URL + "kungfufighting.png" + timestamp;
                    jumpscareTrack.src = BASE_URL + "6.mp3" + timestamp;
                    jumpscareTrack.play().catch(err => console.log(err));
                }
                else if (data.action === 'TRIGGER') {
                    currentPrankImage = data.file;
                    imageElement.src = BASE_URL + currentPrankImage;
                } 
                else if (data.action === 'RESET_IMAGE') {
                    currentPrankImage = null;
                    imageElement.src = BASE_URL + defaultImage + timestamp;
                }
                // Catching both standard audio parameters and song variables
                else if (data.action === 'TRIGGER_AUDIO' || data.action === 'TRIGGER_SONG') {
                    stopAllAudioAndEffects();
                    flexibleAudioTrack = new Audio(BASE_URL + data.file + timestamp);
                    flexibleAudioTrack.play().catch(err => console.log("Playback failed:", err));
                } 
                else if (data.action === 'RESET_AUDIO') {
                    stopAllAudioAndEffects();
                }
                else if (data.action === 'RESET_ALL') {
                    stopAllAudioAndEffects();
                    currentPrankImage = null;
                    imageElement.src = BASE_URL + defaultImage + timestamp;
                }
            });
        }

        function scanAndRefreshAssets() {
            const preloaderContainer = document.getElementById('preloaderContainer');
            const imageElement = document.getElementById('memeImg');
            const timestamp = "?t=" + new Date().getTime();
            
            if (preloaderContainer) preloaderContainer.innerHTML = '';
            
            let discoveredImages = ["1.png", "2.png", "3.png", "4.png"];
            let discoveredAudio = ["1.mp3", "2.mp3", "3.mp3", "4.mp3", "5.mp3", "6.mp3", "7.mp3", "8.mp3", "9.mp3", "10.mp3"];
            
            // Generate full map of song filenames from song1.mp3 to song100.mp3
            let discoveredSongs = []; 
            for (let i = 1; i <= 100; i++) {
                discoveredSongs.push(`song${i}.mp3`);
            }

            discoveredImages.forEach(imgFile => {
                const preload = new Image();
                preload.src = BASE_URL + imgFile + timestamp;
                if (preloaderContainer) preloaderContainer.appendChild(preload);
            });

            validImagesFound = discoveredImages;
            validAudioFound = discoveredAudio;
            validSongsFound = discoveredSongs;

            drone.publish({
                room: roomName,
                message: { 
                    action: 'SYNC_LIST', 
                    images: validImagesFound, 
                    audio: validAudioFound,
                    songs: validSongsFound
                }
            });

            if (!currentPrankImage && imageElement) {
                imageElement.src = BASE_URL + defaultImage + timestamp;
            }
        }

        function toggleFullscreen(event) {
            if (event) event.stopPropagation(); 
            
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                sourceNode = audioCtx.createMediaElementSource(jumpscareTrack);
                sourceNode.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            }

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            jumpscareTrack.play().then(() => { jumpscareTrack.pause(); }).catch(e => console.log(e));

            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
