<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeVault - Random Fullscreen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }

        .fullscreen-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>

    <img id="memeImg" alt="Meme" class="fullscreen-image">

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const imageElement = document.getElementById('memeImg');
            
            // Scan the current directory
            fetch('./')
                .then(response => response.text())
                .then(data => {
                    // Create a global regular expression to find ALL jpg links in the folder
                    const regex = /href="([^"\s>]+(?:\.jpg|\.jpeg))"/ig;
                    let matches = [];
                    let match;
                    
                    // Collect every matching file name found
                    while ((match = regex.exec(data)) !== null) {
                        matches.push(match[1]);
                    }

                    // If we found any JPGs, pick a random one!
                    if (matches.length > 0) {
                        const randomIndex = Math.floor(Math.random() * matches.length);
                        imageElement.src = matches[randomIndex];
                    } else {
                        // Fallback if no images are found via scan
                        imageElement.src = "image.jpg";
                    }
                })
                .catch(() => {
                    // Fallback if directory scanning is restricted by the browser
                    imageElement.src = "image.jpg";
                });
        });
    </script>

</body>
</html>
